spring:

  cloud:
    gateway:
      server:
        webflux:
          routes:
            - id: food-service
              uri: lb://FOOD-SERVICE
              predicates:
                - Path=/api/v1/food/**

            - id: category-service
              uri: lb://FOOD-SERVICE
              predicates:
                - Path=/api/v1/categories/**
              filters:
                - StripPrefix=2

            - id: enrollment-service
              uri: lb://ENROLLMENT-SERVICE
              predicates:
                - Path=/api/v1/enrollments/**

          default-filters:
            - PreserveHostHeader

          globalcors:
            cors-configurations:
              '[/**]':
                allowedOrigins: "*"
                allowed-methods: "*"
                allowed-headers: "*"
server:
  port: 7000